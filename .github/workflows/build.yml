name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build www
        run: node build.js

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        run: npx cap add android || echo "Android already added"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Copy InstalledApps plugin
        run: |
          PLUGIN_DIR="android/app/src/main/java/org/nekoblock/installedapps"
          mkdir -p "$PLUGIN_DIR"
          cp android-plugin/src/main/java/org/nekoblock/installedapps/InstalledAppsPlugin.java "$PLUGIN_DIR/"

      - name: Register plugin in MainActivity
        run: |
          MAIN=$(find android/app/src/main/java -name "MainActivity.java" | head -1)
          echo "Found MainActivity at: $MAIN"
          PKG_DIR=$(dirname "$MAIN")
          PKG=$(echo "$PKG_DIR" | sed 's|.*java/||' | tr '/' '.')
          echo "Package: $PKG"
          cat > "$MAIN" << JAVA
          package $PKG;

          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;
          import org.nekoblock.installedapps.InstalledAppsPlugin;

          public class MainActivity extends BridgeActivity {
          @Override
          public void onCreate(Bundle savedInstanceState) {
          registerPlugin(InstalledAppsPlugin.class);
          super.onCreate(savedInstanceState);
          }
          }
          JAVA

      - name: Grant gradlew execute permission
        run: chmod +x
