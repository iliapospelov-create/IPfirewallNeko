name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Install dependencies
        run: npm install

      - name: Build www
        run: node build.js

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        run: npx cap add android || echo "Android already added"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Copy InstalledApps plugin
        run: |
          PLUGIN_DIR="android/app/src/main/java/org/nekoblock/installedapps"
          mkdir -p "$PLUGIN_DIR"
          cp android-plugin/src/main/java/org/nekoblock/installedapps/InstalledAppsPlugin.java "$PLUGIN_DIR/"

      - name: Register plugin in MainActivity
        run: |
          MAIN=$(find android/app/src/main/java -name "MainActivity.java" | head -1)
          echo "Found MainActivity at: $MAIN"
          PKG_DIR=$(dirname "$MAIN")
          PKG=$(echo "$PKG_DIR" | sed 's|.*java/||' | tr '/' '.')
          echo "Package: $PKG"
          printf 'package %s;\n\nimport android.os.Bundle;\nimport com.getcapacitor.BridgeActivity;\nimport org.nekoblock.installedapps.InstalledAppsPlugin;\n\npublic class MainActivity extends BridgeActivity {\n  @Override\n  public void onCreate(Bundle savedInstanceState) {\n    registerPlugin(InstalledAppsPlugin.class);\n    super.onCreate(savedInstanceState);\n  }\n}\n' "$PKG" > "$MAIN"
          echo "MainActivity updated"
          cat "$MAIN"

      - name: Grant gradlew execute permission
        run: |
          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
          else
            echo "gradlew not found, generating..."
            cd android
            gradle wrapper --gradle-version 8.2
            chmod +x gradlew
          fi

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IPfirewallNeko-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
